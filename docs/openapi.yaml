  /api/v1/sync/animal:
    post:
      tags: [Sync]
      summary: Upsert single animal (idempotent)
      description: |
        Validates and persists one animal. Single and batch share the same
        validateAndSyncOne domain path. Returns stable reason_code on failure;
        never leaks raw database errors.
      operationId: syncAnimal
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncAnimalRequest"
      responses:
        "201":
          description: Synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncAnimalResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/sync/animals:
    post:
      tags: [Sync]
      summary: Batch upsert animals (non-atomic per-item results)
      description: |
        Non-atomic batch: each item is validated and synced independently via
        the same validateAndSyncOne path as POST /sync/animal. Max 100 items.
        Response is always a results array with per-item status and reason_code;
        raw DB errors are never returned.
      operationId: syncAnimalsBatch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchSyncRequest"
      responses:
        "200":
          description: Per-item batch results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchSyncResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    get:
      tags: [Sync]
      summary: Pull animals (cursor)
      description: |
        Pull animals by server_version cursor (`since_version`).
        Soft-deleted animals are returned as tombstones only
        (`uuid`, `deleted_at`, `server_version`) — never full content or precise coordinates.
      operationId: pullAnimals
      security:
        - bearerAuth: []
      parameters:
        - name: since_version
          in: query
          schema:
            type: integer
            format: int64
          description: Exclusive lower bound of server_version
        - name: cursor
          in: query
          schema:
            type: string
          description: Deprecated alias; prefer since_version
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Animals page (active rows + tombstones)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/sync/animals/{uuid}:
    get:
      tags: [Sync]
      summary: Get single collection animal detail
      description: |
        Returns one owned animal by uuid. Soft-deleted animals return a minimal
        tombstone (`uuid`, `deleted_at`, `server_version`). Unauthorized access
        returns 404 (no existence leak).
      operationId: getAnimalDetail
      security:
        - bearerAuth: []
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Animal detail or tombstone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionAnimalDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found or not owned
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    patch:
      tags: [Sync]
      summary: Patch collection animal (nickname/favorite/locked)
      description: |
        Partial update of client-editable collection metadata.
        Optimistic lock via `If-Match` header (preferred) or body `server_version`.
        On version conflict returns 409 with `current` representation for merge.
      operationId: patchAnimal
      security:
        - bearerAuth: []
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: false
          schema:
            type: string
          description: Expected server_version (quoted ETag supported)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionAnimalPatch"
      responses:
        "200":
          description: Updated animal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionAnimalDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found or not owned
        "409":
          description: Version conflict / already deleted / locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionVersionConflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    delete:
      tags: [Sync]
      summary: Soft-delete animal (tombstone)
      description: |
        Soft-deletes one animal and bumps server_version for pull.
        Response is a minimal tombstone only — never full content.
        Requires If-Match or query server_version. Locked animals return 409.
        Double delete returns 409 already_deleted with current tombstone.
      operationId: deleteAnimal
      security:
        - bearerAuth: []
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: false
          schema:
            type: string
        - name: server_version
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Tombstone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionTombstone"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found or not owned
        "409":
          description: Version conflict / already deleted / locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionVersionConflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

