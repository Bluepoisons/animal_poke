  /api/v1/privacy/export:
    post:
      tags: [Privacy]
      summary: Request data export
      description: |
        Default complete export: paginates all animals (beyond 200), consent,
        security report metadata (no raw payloads), data_request history (no nested payloads),
        orders and entitlements when present. Precise coordinates are always redacted.
        Optional `cursor` query returns a single page for large exports.
      operationId: exportData
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          description: Optional animal id cursor for page-only export
      requestBody:
        required: false
        description: 可选导出范围；省略请求体或 scope 时默认仅导出当前设备数据
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrivacyExportRequest"
      responses:
