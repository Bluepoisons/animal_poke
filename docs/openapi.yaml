          description: Wallet balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/wallet/credit:
    post:
      tags: [Economy]
      summary: Credit wallet
      description: |
        Credits gold or stamina. Idempotent on operation_id (global unique).
        Same reward source can only credit once.
      operationId: creditWallet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletMutateRequest"
      responses:
        "201":
          description: Credited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletMutateResponse"
        "200":
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletMutateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/wallet/debit:
    post:
      tags: [Economy]
      summary: Debit wallet
      description: |
        Debits gold or stamina. Never allows negative balance.
        Concurrent debits are serialised (SELECT FOR UPDATE).
        Idempotent on operation_id.
      operationId: debitWallet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletMutateRequest"
      responses:
        "200":
          description: Debited or idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletMutateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Insufficient balance (reason_code insufficient_balance)

  /api/v1/wallet/ledger:
    get:
      tags: [Economy]
      summary: List wallet ledger
      description: Paginated immutable reward/consume ledger (newest first).
      operationId: listWalletLedger
      security:
        - bearerAuth: []
      parameters:
        - name: currency
          in: query
          schema:
            type: string
            enum: [gold, stamina]
        - name: after_id
          in: query
          description: Cursor — return entries with id less than this
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Ledger page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletLedgerResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/wallet/reconcile:
    post:
      tags: [Economy]
      summary: Rebuild balance from ledger
      description: Recomputes currency balance from immutable ledger and writes snapshot.
      operationId: reconcileWallet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currency]
              properties:
                currency:
                  type: string
                  enum: [gold, stamina]
      responses:
        "200":
          description: Reconciled balance
          content:
            application/json:
              schema:
                type: object
                required: [currency, balance]
                properties:
                  currency: { type: string }
                  balance: { type: integer, format: int64 }
                  request_id: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/inventory:
    get:
      tags: [Economy]
      summary: List inventory
      operationId: listInventory
      security:
        - bearerAuth: []
      responses:
        "200":
