  /api/v1/admin/auth/token:
    post:
      tags: [Admin]
      summary: Issue short-lived admin JWT
      description: |
        Issues a short-lived admin access JWT bound to a session (AP-085).
        Allowed via: super admin JWT, break-glass (X-Admin-Key + X-Admin-Actor + X-Admin-Reason),
        or non-production dev_secret. Production forbids shared key as regular auth.
      operationId: adminIssueToken
      security: []
      parameters:
        - $ref: "#/components/parameters/AdminActorHeader"
        - $ref: "#/components/parameters/AdminReasonHeader"
        - $ref: "#/components/parameters/AdminKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actor, role]
              properties:
                actor: { type: string }
                role:
                  type: string
                  enum: [support, content, ops, finance, security, super]
                subject: { type: string }
                dev_secret: { type: string }
      responses:
        "200":
          description: Admin token issued
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/sessions/revoke:
    post:
      tags: [Admin]
      summary: Revoke admin session(s)
      description: Revokes one session_id or all sessions for actor_id. Requires session.revoke.
      operationId: adminRevokeSession
      security:
        - adminBearer: []
        - adminBreakGlass: []
      parameters:
        - $ref: "#/components/parameters/AdminReasonHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string }
                actor_id: { type: string }
                reason: { type: string }
      responses:
        "200":
          description: Revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

