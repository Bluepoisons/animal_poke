      operationId: adminWriteGameConfig
      security:
        - adminBearer: []
        - adminBreakGlass: []
      parameters:
        - $ref: "#/components/parameters/AdminReasonHeader"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Accepted
        "403":
          description: Permission denied

