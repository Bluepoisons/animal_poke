        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/growth/events:
    get:
      tags: [Growth]
      summary: List growth events
      description: Paginated authoritative growth event ledger (newest first) for cross-device restore.
      operationId: listGrowthEvents
      security:
        - bearerAuth: []
      parameters:
        - name: after_id
          in: query
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Event page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrowthEventListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Growth]
      summary: Record growth event
      description: |
        Server-authoritative, idempotent on event_id. Unlocks convenience/content only —
        never changes recognition results or combat stats. Rejects paid power, decay and
        real-world feeding kinds.
      operationId: postGrowthEvent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrowthEventRequest"
      responses:
        "201":
          description: Event applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrowthEventApplyResponse"
        "200":
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrowthEventApplyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden kind (paid power / decay / real feed)
        "404":
          description: Companion animal not found or not owned

