  /api/v1/value/generate:
    post:
      tags: [Value]
      summary: Generate pet stats/narrative (deterministic rarity/stats)
      description: |
        Rarity and battle stats are computed server-side via HMAC-seeded algorithm
        (seed = parent/capture inference id + config_version + server secret).
        LLM only supplies narrative. The server persists the animal in the same
        transaction as its value inference; no client-side animal sync is required.
        Response includes factors for transparency and the created animal UUID.
      operationId: valueGenerate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [species]
              properties:
                species: { type: string }
                species_label_zh: { type: string, description: Concrete Simplified Chinese species name from trusted lineage }
                breed: { type: string }
                color: { type: string }
                body_type: { type: string }
                subject_completeness: { type: integer, minimum: 1, maximum: 10 }
                clarity: { type: integer, minimum: 1, maximum: 10 }
                lighting: { type: integer, minimum: 1, maximum: 10 }
                composition: { type: integer, minimum: 1, maximum: 10 }
                pose: { type: integer, minimum: 1, maximum: 10 }
                angle: { type: integer, minimum: 1, maximum: 10 }
                parent_inference_id: { type: string }
                analyze_inference_id: { type: string }
                inference_request_id: { type: string }
                capture_id: { type: string }
              additionalProperties: true
      responses:
        "200":
          description: Generated value with deterministic stats and factors
          content:
            application/json:
              schema:
                type: object
                properties:
                  rarity: { type: integer, minimum: 1, maximum: 5 }
                  species_label_zh: { type: string }
                  hp: { type: integer }
                  atk: { type: integer }
                  def: { type: integer }
                  spd: { type: integer }
                  class: { type: string }
                  element: { type: string }
                  narrative: { type: string }
                  fiction: { type: boolean, description: Always true — fictional vignette only (AP-131) }
                  disclaimer: { type: string }
                  layer: { type: string, description: fictional_vignette }
                  policy_version: { type: string }
                  config_version: { type: string }
                  seed_id: { type: string }
                  factors:
                    type: object
                    properties:
                      photo_quality: { type: number }
                      completeness: { type: number }
                      species_weight: { type: number }
                      breed_weight: { type: number }
                      color_weight: { type: number }
                      base_score: { type: number }
                      random_jitter: { type: number }
                      final_score: { type: number }
                      quality_band: { type: string }
                  inference_id: { type: string }
                  animal_uuid: { type: string, format: uuid, description: Server-persisted animal record UUID }
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/adventures:
    get:
      tags: [Adventure]
