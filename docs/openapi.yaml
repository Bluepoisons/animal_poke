components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived admin JWT (AP-085). iss/aud env-isolated; includes actor/role/sid.
    adminBreakGlass:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: |
        Break-glass only. Requires X-Admin-Actor + X-Admin-Reason.
        Production rejects shared key as regular auth unless ADMIN_BREAK_GLASS_ENABLED=true.
    adminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
      description: Deprecated alias for break-glass; prefer adminBearer.

  parameters:
    Lat:
      name: lat
      in: query
      required: true
      schema:
        type: number
        format: double
        minimum: -90
        maximum: 90
    Lng:
      name: lng
      in: query
      required: true
      schema:
        type: number
        format: double
        minimum: -180
        maximum: 180
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
    AdminKeyHeader:
      name: X-Admin-Key
      in: header
      required: false
      schema: { type: string }
      description: Break-glass shared key (not regular production auth)
    AdminActorHeader:
      name: X-Admin-Actor
      in: header
      required: false
      schema: { type: string }
      description: Real operator identity for break-glass
    AdminReasonHeader:
      name: X-Admin-Reason
      in: header
      required: false
      schema: { type: string }
      description: Required reason for admin write / break-glass actions
  headers:
    RequestID:
      description: Request correlation ID
      schema:
        type: string
    RetryAfter:
      description: Seconds to wait before retry
      schema:
        type: integer

  responses:
    BadRequest:
      description: Bad request
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Forbidden
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Not found
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PayloadTooLarge:
      description: Image too large
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnsupportedMediaType:
      description: Unsupported media type
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Rate limited
      headers:
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: Dependency unavailable
      headers:
        Retry-After:
          $ref: "#/components/headers/RetryAfter"
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ServiceUnavailableError"
    FeatureUnavailable:
      description: Product feature disabled or not ready (reason_code feature_unavailable)
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FeatureUnavailableError"
    NotImplemented:
      description: Feature not implemented or not enabled (HTTP 501)
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    GameConfig:
      type: object
      required: [version, economy]
      properties:
        version:
          type: string
        economy:
          type: object
          additionalProperties:
            type: number
        features:
          type: object
          additionalProperties:
            type: boolean
        meta:
          type: object
          additionalProperties: true
    GameConfigResponse:
      type: object
      required: [version, economy, request_id]
      properties:
        version:
          type: string
        economy:
          type: object
          additionalProperties:
            type: number
        features:
          type: object
          additionalProperties:
            type: boolean
        meta:
          type: object
          additionalProperties: true
        request_id:
          type: string
    Error:
      type: object
      required: [error, reason_code, retryable]
      description: |
        Unified API error envelope. All 4xx/5xx JSON errors should converge here.
        Handlers may attach extra diagnostic fields, but clients must rely on these core keys.
      properties:
        error:
          type: string
          description: Human-readable error message (safe for clients)
          example: invalid JSON body
        reason_code:
          type: string
          description: Machine-readable reason code
          example: bad_request
        request_id:
          type: string
          description: Correlation id (also returned as X-Request-ID header)
        retryable:
          type: boolean
          description: Whether the client may safely retry the request
          example: false
        details:
          type: object
          additionalProperties: true
          description: Optional structured context (e.g. unknown field name)
          example:
            field: extra
    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/Error"
      description: Alias of Error (historical name used by some operations)
    FeatureUnavailableError:
      type: object
      required: [error, reason_code]
      properties:
        error:
          type: string
          example: feature unavailable
        reason_code:
          type: string
          example: feature_unavailable
        feature:
          type: string
          description: ranking|pvp|social|ops
        request_id:
          type: string
    ServiceUnavailableError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - type: object
          required: [error, reason_code, retryable]
          properties:
            error:
              type: string
              example: service unavailable
            reason_code:
              type: string
              example: db_unavailable
            retryable:
              type: boolean
              example: true
    HealthResponse:
      type: object
      required: [status, time]
      properties:
        status:
          type: string
          example: ok
        time:
          type: string
          format: date-time
    ReadyResponse:
      type: object
      required: [ready]
      properties:
        ready:
          type: boolean
        app_env:
          type: string
        db:
          type: string
          enum: [up, down, unavailable]
        schema:
          type: string
        config_errors:
          type: array
          items:
            type: string
    TimeResponse:
      type: object
      required: [server_time, unix_ms, nonce, signature, expires_in]
      properties:
        server_time:
          type: string
        unix_ms:
          type: integer
          format: int64
        nonce:
          type: string
        signature:
          type: string
        expires_in:
          type: integer
    AuthDeviceRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          type: string
          description: UUID or 8-64 alphanumeric/_-
        installation_secret:
          type: string
          description: Required after first registration; proves device ownership
    AuthDeviceResponse:
      type: object
      required: [token, expires_at, token_type]
      properties:
        token:
          type: string
        expires_at:
          type: string
        token_type:
          type: string
          example: Bearer
        account_id:
          type: string
        guest:
          type: boolean
    PrivacyExportRequest:
      type: object
      properties:
        scope:
          type: string
          enum: [device, account]
          description: device 仅导出当前设备数据（省略时默认）；account 导出当前已绑定账号的数据
    PrivacyDeleteRequest:
      type: object
      properties:
        scope:
          type: string
          enum: [device, account]
          default: device
        reauth_password:
          type: string
          description: Required when scope=account unless reauth_token is provided (verified email password)
        reauth_token:
          type: string
          description: Short-lived reauth token from POST /auth/reauth (AP-079)
        confirm:
          type: string
          description: Must be DELETE when scope=account
    AuthBindRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
          enum: [email]
          description: Public production providers. Development may also accept mock_oauth when AUTH_MOCK_OAUTH_ENABLED (returns 404 provider_unavailable otherwise).
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        oauth_subject:
          type: string
          description: Development-only mock provider field (not a production provider)
        oauth_token:
          type: string
          description: Development-only mock provider field; server stores only a hash
        display_name:
          type: string
    AuthLoginRequest:
      type: object
      required: [device_id, provider]
      properties:
        device_id:
          type: string
          description: Device to link. New devices need no proof; claiming existing guest assets requires proof.
        provider:
          type: string
          enum: [email]
          description: Public production providers. Development may also accept mock_oauth when AUTH_MOCK_OAUTH_ENABLED.
        email:
          type: string
        password:
          type: string
        oauth_subject:
          type: string
          description: Development-only mock provider field
        oauth_token:
          type: string
          description: Development-only mock provider field
        installation_secret:
          type: string
          description: Device ownership proof required when merging guest assets or re-enabling a revoked device
        migration_ticket:
          type: string
          description: One-time migration ticket alternative to installation_secret; replay is rejected
    AuthRefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Opaque refresh token returned once from bind/login/refresh
        device_id:
          type: string
          description: Optional binding check; mismatch revokes the family

    AuthAccountResponse:
      type: object
      required: [token, expires_at, token_type]
      properties:
        token:
          type: string
        expires_at:
          type: string
        token_type:
          type: string
        account_id:
          type: string
        refresh_token:
          type: string
          description: Returned once; server stores only hash
        guest:
          type: boolean
        merge:
          type: object
          properties:
            animals_moved:
              type: integer
            animals_skipped:
              type: integer
            entitlements_moved:
              type: integer
            entitlements_merged:
              type: integer
            orders_moved:
              type: integer
            operation_id:
              type: string
            proof_type:
              type: string
              description: none | installation_secret | migration_ticket
        operation_id:
          type: string
          description: Unique login link/merge operation id for audit (AP-076)
        email_verified:
          type: boolean
          description: Present for email bind flows (AP-079)
        verification_required:
          type: boolean
          description: True when email binding is pending verification
        debug_security_token:
          type: string
          description: Non-production only; email verify token for local/test
    AuthEmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    AuthTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    AuthAcceptedResponse:
      type: object
      properties:
        status:
          type: string
          example: accepted
        debug_security_token:
          type: string
          description: Non-production only
    AuthPasswordResetRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8
    AuthPasswordChangeRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
    AuthUnbindRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
        subject:
          type: string
        reauth_password:
          type: string
        reauth_token:
          type: string
    AuthAccountInfo:
      type: object
      properties:
        guest:
          type: boolean
        account_id:
          type: string
        display_name:
          type: string
        status:
          type: string
        device_id:
          type: string
        bindings:
          type: array
          items:
            type: object
            properties:
              provider:
                type: string
              provider_subject:
                type: string
                description: Masked for email
              verified:
                type: boolean
    AuthDeviceList:
      type: object
      properties:
        guest:
          type: boolean
        account_id:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              device_id:
                type: string
              device_label:
                type: string
              status:
                type: string
              linked_at:
                type: string
              last_seen_at:
                type: string
              revoked_at:
                type: string
              current:
                type: boolean
    CityResponse:
      type: object
      additionalProperties: true
      properties:
        city:
          type: string
        province:
          type: string
        country:
          type: string
    WeatherWeekResponse:
      type: object
      additionalProperties: true
      properties:
        week:
          type: array
          items:
            type: object
            additionalProperties: true
        source:
          type: string
    VisionDetectBox:
      type: object
      required: [species, confidence, target_id]
      properties:
        species:
          type: string
          description: 注册物种 ID；other_animal 表示已确认是真实动物但未落入具体类别
          enum:
            - cat
            - dog
            - rabbit
            - horse
            - cow
            - sheep
            - goat
            - pig
            - deer
            - squirrel
            - monkey
            - bear
            - elephant
            - big_cat
            - bird
            - goose
            - duck
            - chicken
            - pigeon
            - parrot
            - eagle
            - turtle
            - lizard
            - snake
            - crocodile
            - frog
            - salamander
            - fish
            - shark
            - dolphin
            - whale
            - octopus
            - crab
            - butterfly
            - bee
            - other_animal
        label:
          type: string
          description: 简体中文物种标签；other_animal 时必须是具体名称，例如“赤狐”
        target_id:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        bounding_box:
          type: object
          description: 旧多目标响应的兼容字段；照片级识别可以省略
          required: [x, y, width, height]
          properties:
            x: { type: number, minimum: 0, maximum: 1 }
            y: { type: number, minimum: 0, maximum: 1 }
            width: { type: number, minimum: 0, maximum: 1 }
            height: { type: number, minimum: 0, maximum: 1 }
    VisionDetectResponse:
      type: object
      additionalProperties: true
      properties:
        animals:
          type: array
          items:
            $ref: "#/components/schemas/VisionDetectBox"
          description: Backward-compatible alias of targets
        targets:
          type: array
          items:
            $ref: "#/components/schemas/VisionDetectBox"
          description: Multi-animal targets with stable target_id
        inference_id:
          type: string
        reason_code:
          type: string
          description: Public reason when empty or rejected (e.g. reject_portrait)
        source:
          type: string
        safety:
          $ref: "#/components/schemas/SafetySummary"
    VisionCorrectionRequest:
      type: object
      required: [detect_inference_id, species, species_label_zh]
      properties:
        detect_inference_id: { type: string }
        target_id: { type: string, description: Stable target_id from the original detect result; defaults to the primary target }
        species: { type: string, description: Canonical registered species ID or other_animal }
        species_label_zh: { type: string, maxLength: 64, description: Concrete Simplified Chinese animal name }
    VisionCorrectionResponse:
      type: object
      required: [inference_id, parent_inference_id, target_id, original_species, species, label, confidence, source]
      properties:
        inference_id: { type: string }
        parent_inference_id: { type: string }
        target_id: { type: string }
        original_species: { type: string }
        species: { type: string }
        label: { type: string, description: Trusted concrete Simplified Chinese species name }
        confidence: { type: number, minimum: 0, maximum: 1 }
        source: { type: string, enum: [user_confirmation] }
        expires_at: { type: string, format: date-time }
    SafetySummary:
      type: object
      required: [allowed, collectable, decision_code, action]
      properties:
        allowed:
          type: boolean
        collectable:
          type: boolean
        decision_code:
          type: string
          description: Public moderation code (no model internals)
          enum:
            - ok
            - reject_portrait
            - reject_child_focus
            - reject_sensitive
            - reject_unsafe
            - flag_sensitive
            - flag_abuse
            - flag_injured
        action:
          type: string
          enum: [allow, reject, flag]
        flags:
          type: array
          items:
            type: string
            enum: [face, child, plate, house, abuse, injured]
        report_path:
          type: string
          enum: [abuse, injured]
    SafetyReportRequest:
      type: object
      required: [category]
      properties:
        category:
          type: string
          enum: [abuse, injured, portrait, sensitive, other]
        inference_id:
          type: string
        note:
          type: string
          maxLength: 1000
        decision_code:
          type: string
    SafetyReportResponse:
      type: object
      required: [status, report_id, decision_code, category]
      properties:
        status:
          type: string
          example: accepted
        report_id:
          type: string
        decision_code:
          type: string
        category:
          type: string
        request_id:
          type: string
    AccountDefaultsResponse:
      type: object
      properties:
        defaults:
          type: object
          additionalProperties: true
          properties:
            audience:
              type: string
              enum: [minor, adult]
            strict:
              type: boolean
            play_hours_start:
              type: integer
            play_hours_end:
              type: integer
            daily_limit_min:
              type: integer
            location_scope:
              type: string
              enum: [none, city, precise]
            social_enabled:
              type: boolean
        config:
          type: object
          properties:
            strict_minor_defaults:
              type: boolean
        request_id:
          type: string
        server_time:
          type: string
          format: date-time

    VisionAnalyzeResponse:
      type: object
      additionalProperties: true
      properties:
        species: { type: string }
        species_label_zh: { type: string }
        breed: { type: string }
        color: { type: string }
        body_type: { type: string }
        inference_id: { type: string }
        parent_inference_id: { type: string }
        target_id: { type: string }
        source: { type: string }
        safety:
          $ref: "#/components/schemas/SafetySummary"
    SyncAnimalRequest:
      type: object
      required: [uuid, species, rarity, generated_at]
      properties:
        uuid: { type: string, format: uuid }
        species: { type: string }
        species_label_zh: { type: string, maxLength: 64, description: Concrete Simplified Chinese species name; required for other_animal }
        breed: { type: string }
        rarity: { type: integer, minimum: 1, maximum: 5 }
        hp: { type: integer }
        atk: { type: integer }
        def: { type: integer }
        spd: { type: integer }
        class: { type: string }
        element: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        city: { type: string }
        generated_at: { type: string, format: date-time }
        inference_request_id: { type: string }
        keep_precise_location: { type: boolean }
        nickname: { type: string, maxLength: 32, description: Client-editable display nickname }
        favorite: { type: boolean, description: Favorited flag }
        locked: { type: boolean, description: Collection lock; blocks delete when true }
    CollectionAnimalDetail:
      type: object
      description: |
        Full detail for an active animal, or a minimal tombstone when deleted.
        Tombstone fields only: uuid, deleted_at, server_version.
      properties:
        uuid: { type: string, format: uuid }
        device_id: { type: string }
        account_id: { type: string }
        species: { type: string }
        species_label_zh: { type: string }
        breed: { type: string }
        rarity: { type: integer }
        hp: { type: integer }
        atk: { type: integer }
        def: { type: integer }
        spd: { type: integer }
        class: { type: string }
        element: { type: string }
        city: { type: string }
        geohash: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        generated_at: { type: string, format: date-time }
        inference_request_id: { type: string }
        nickname: { type: string, maxLength: 32 }
        favorite: { type: boolean }
        locked: { type: boolean }
        server_version: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
        deleted_at: { type: string, format: date-time }
    CollectionAnimalPatch:
      type: object
      description: Partial update; at least one of nickname/favorite/locked required.
      properties:
        nickname: { type: string, maxLength: 32 }
        favorite: { type: boolean }
        locked: { type: boolean }
        server_version:
          type: integer
          format: int64
          description: Expected version when If-Match header is absent
    CollectionTombstone:
      type: object
      required: [uuid, server_version]
      properties:
        uuid: { type: string, format: uuid }
        deleted_at: { type: string, format: date-time }
        server_version: { type: integer, format: int64 }
    CollectionVersionConflict:
      type: object
      required: [error, reason_code]
      properties:
        error: { type: string }
        reason_code:
          type: string
          enum: [version_conflict, already_deleted, animal_locked]
        current:
          description: Current server representation for client merge
          oneOf:
            - $ref: "#/components/schemas/CollectionAnimalDetail"
            - $ref: "#/components/schemas/CollectionTombstone"
    SyncAnimalResponse:
      type: object
      required: [status, uuid]
      properties:
        status: { type: string, example: synced }
        uuid: { type: string }
        review_status: { type: string }
    BatchSyncRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/SyncAnimalRequest"
    BatchSyncResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              uuid: { type: string }
              status: { type: string }
              error: { type: string }
              reason_code: { type: string }
    ErrorReportRequest:
      type: object
      required: [message]
      properties:
        message: { type: string }
        stack: { type: string }
        component: { type: string }
        route: { type: string }
        release: { type: string }
        level: { type: string }
        extra:
          type: object
          additionalProperties: { type: string }
    ErrorReportResponse:
      type: object
      required: [accepted]
      properties:
        accepted: { type: boolean }
        request_id: { type: string }
    AnalyticsIngestRequest:
      type: object
      required: [events]
      properties:
        schema_version: { type: integer, enum: [0, 1] }
        events:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/AnalyticsEvent"
    AnalyticsEvent:
      type: object
      required: [name, session_id, event_id]
      properties:
        schema_version: { type: integer }
        session_id: { type: string }
        name:
          type: string
          enum: [auth, camera_ok, scan, detect_result, capture_attempt, generate_stage, collection_complete, trade, battle_end]
        ts: { type: integer, format: int64 }
        event_id: { type: string }
        coarse_location:
          type: object
          properties:
            city: { type: string }
            region: { type: string }
            country: { type: string }
        experiment_id: { type: string }
        experiment_variant: { type: string }
        props:
          type: object
          additionalProperties: true
    AnalyticsIngestResponse:
      type: object
      required: [accepted, dropped, schema_version]
      properties:
        accepted: { type: integer }
        dropped: { type: integer }
        schema_version: { type: integer }
        request_id: { type: string }
    WalletBalance:
      type: object
      required: [currency, balance]
      properties:
        currency:
          type: string
          enum: [gold, stamina]
        balance:
          type: integer
          format: int64
          minimum: 0
    WalletResponse:
      type: object
      required: [owner_key, balances]
      properties:
        owner_key: { type: string }
        balances:
          type: array
          items:
            $ref: "#/components/schemas/WalletBalance"
        request_id: { type: string }
    WalletMutateRequest:
      type: object
      required: [currency, amount, operation_id]
      properties:
        currency:
          type: string
          enum: [gold, stamina]
        amount:
          type: integer
          format: int64
          minimum: 1
        operation_id:
          type: string
          maxLength: 128
          description: Global unique idempotency key for this ledger entry
        source_type:
          type: string
          description: checkin|task|battle|capture|shop|admin|compensate|reward|system|dispatch|level_up
        source_id: { type: string }
        metadata: { type: string }
    WalletLedgerEntry:
      type: object
      properties:
        entry_id: { type: string }
        operation_id: { type: string }
        owner_key: { type: string }
        device_id: { type: string }
        account_id: { type: string }
        kind:
          type: string
          enum: [currency, item]
        currency: { type: string }
        delta: { type: integer, format: int64 }
        amount: { type: integer, format: int64 }
        balance_after: { type: integer, format: int64 }
        source_type: { type: string }
        source_id: { type: string }
        metadata: { type: string }
        created_at: { type: string, format: date-time }
    WalletMutateResponse:
      type: object
      required: [balance, idempotent]
      properties:
        entry:
          $ref: "#/components/schemas/WalletLedgerEntry"
        balance: { type: integer, format: int64 }
        idempotent: { type: boolean }
        request_id: { type: string }
    WalletLedgerResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/WalletLedgerEntry"
        next_after: { type: integer, format: int64 }
        request_id: { type: string }
    InventoryItem:
      type: object
      properties:
        item_id: { type: string }
        quantity: { type: integer, format: int64, minimum: 0 }
        owner_key: { type: string }
        device_id: { type: string }
        account_id: { type: string }
        updated_at: { type: string, format: date-time }
    InventoryListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
        request_id: { type: string }
    InventoryMutateRequest:
      type: object
      required: [item_id, quantity, operation_id]
      properties:
        item_id: { type: string }
        quantity: { type: integer, format: int64, minimum: 1 }
        operation_id: { type: string, maxLength: 128 }
        source_type: { type: string }
        source_id: { type: string }
        metadata: { type: string }


    SocialFriendItem:
      type: object
      properties:
        user_key: { type: string }
        display_name: { type: string }
        since: { type: string, format: date-time }
    SocialFriendsResponse:
      type: object
