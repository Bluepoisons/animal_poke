                metrics:
                  $ref: "#/components/schemas/PhotoMetrics"
                theme_id: { type: string }
                a11y_completed: { type: boolean }
                persist: { type: boolean, description: "false = dry-run without consuming daily cap" }
      responses:
        "200":
          description: Score result with signature and optional personal best
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoScoreResponse"
        "400":
