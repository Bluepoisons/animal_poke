          in: query
          required: false
          schema:
            type: string
            enum: ["0", "1", "true", "false"]
          description: When 1/true, return minor defaults (strict when STRICT_MINOR_DEFAULTS enabled)
      responses:
        "200":
          description: Defaults
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountDefaultsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/commerce/orders:
    post:
      tags: [Commerce]
      summary: Create order
      description: |
        Creates an order for an active catalog product.
        Idempotent on (device_id, idempotency_key).
        Returns 501/503 with reason_code commerce_not_ready when COMMERCE_ENABLED is false
        or production lacks COMMERCE_STORE_VERIFY.
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, idempotency_key]
              properties:
                product_id:
                  type: string
                idempotency_key:
                  type: string
                platform:
                  type: string
                  enum: [mock, apple, google]
      responses:
        "200":
          description: Existing order (idempotent replay)
        "201":
          description: Order created
        "404":
          description: Unknown or inactive product (reason_code product_not_found)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          description: Commerce disabled (reason_code commerce_not_ready)
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/commerce/orders/fulfill:
    post:
      tags: [Commerce]
      summary: Fulfill order
      description: |
        Fulfills a device-scoped order after receipt checks.
        Short receipts rejected. Outside production only platform=mock is allowed.
        Production requires COMMERCE_STORE_VERIFY and real store verification.
      operationId: fulfillOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, receipt]
              properties:
                order_id:
                  type: string
                receipt:
                  type: string
      responses:
        "200":
          description: Fulfilled or already fulfilled
        "400":
          description: Invalid receipt or platform (reason_code receipt_too_short|platform_not_allowed|receipt_invalid)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          description: Commerce not ready
        "503":
          description: Fulfill disabled in production (reason_code fulfill_disabled)

  /api/v1/commerce/orders/refund:
    post:
      tags: [Commerce]
      summary: Device refund (forbidden)
      description: |
        Device JWT clients cannot initiate refunds.
        Always returns 403 with reason_code device_refund_forbidden.
        Use admin POST /api/v1/admin/commerce/orders/refund or platform webhook.
      operationId: refundOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "403":
          description: Device-initiated refund forbidden
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/commerce/orders/{id}:
    get:
      tags: [Commerce]
      summary: Get order
      operationId: getOrder
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/commerce/entitlements:
    get:
      tags: [Commerce]
      summary: List entitlements
      operationId: listEntitlements
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Entitlements
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"


  /api/v1/wallet:
    get:
      tags: [Economy]
      summary: Get wallet balances
      description: |
        Returns gold and stamina balance snapshots for the JWT owner
