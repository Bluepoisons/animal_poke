      responses:
        "200":
          description: Quest detail
          content:
            application/json:
              schema:
                type: object
                required: [quest]
                properties:
                  quest:
                    $ref: "#/components/schemas/QuestView"
                  request_id: { type: string }
        "404":
          description: Not found (reason_code quest_not_found)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/quests/{quest_id}/claim:
    post:
      tags: [Quest]
      summary: Claim quest reward (idempotent)
      description: |
        Claims rewards for a completed quest period. Credits wallet ledger once via
        stable operation_id. Concurrent claims return one create + idempotent replays.
      operationId: claimQuest
      security:
        - bearerAuth: []
      parameters:
        - name: quest_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestClaimResponse"
        "200":
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestClaimResponse"
        "409":
          description: Not claimable or expired (reason_code quest_not_claimable|quest_expired)
        "404":
          description: Quest not found
        "401":
          $ref: "#/components/responses/Unauthorized"


  /api/v1/admin/commerce/orders/refund:
    post:
      tags: [Admin, Commerce]
      summary: Admin refund order
      description: |
        Admin refund path (AP-085). Requires admin JWT (or break-glass) with commerce.refund.
        Support cannot refund. Device JWT clients must not call this.
        Every refund is audited with real actor/session/reason/request_id.
      operationId: adminRefundOrder
      security:
        - adminBearer: []
        - adminBreakGlass: []
      parameters:
        - $ref: "#/components/parameters/AdminReasonHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id]
              properties:
                order_id:
                  type: string
                device_id:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Refunded or already refunded
        "403":
          description: Missing auth or insufficient permission
        "404":
          description: Order not found
        "501":
          description: Commerce not ready
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/admin/commerce/webhooks/refund:
    post:
      tags: [Admin, Commerce]
      summary: Platform refund webhook stub
      description: |
        Stub webhook for store platform refund notifications.
        Authenticated via admin JWT/break-glass with commerce.refund until platform signatures land.
      operationId: webhookRefundOrder
      security:
        - adminBearer: []
        - adminBreakGlass: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id]
              properties:
                order_id:
                  type: string
                device_id:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Refunded
        "403":
          description: Missing or invalid admin credentials

  /api/v1/admin/audit/logs:
    get:
      tags: [Admin]
      summary: List audit logs
      description: Requires audit.logs.read. Actor identity is recorded on each query.
      operationId: listAuditLogs
      security:
        - adminBearer: []
        - adminBreakGlass: []
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/admin/audit/logs/{id}/ack:
    post:
      tags: [Admin]
      summary: Ack audit log
      description: Requires audit.logs.ack. Acked_by is the real admin actor.
      operationId: ackAuditLog
      security:
        - adminBearer: []
        - adminBreakGlass: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/AdminReasonHeader"
      responses:
        "200":
          description: Acked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/ranking/score:
    post:
      tags: [Ranking]
      summary: Report ranking score event (AP-114)
      operationId: rankingScore
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [delta]
              properties:
                city: {type: string}
                date: {type: string}
                delta: {type: integer, format: int64}
                display_name: {type: string}
                eligible: {type: boolean}
      responses:
        "200":
          description: Score accepted
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/ranking/settle:
    post:
      tags: [Ranking]
      summary: Settle daily city ranking snapshot (AP-114)
      operationId: rankingSettle
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [city]
              properties:
                city: {type: string}
                date: {type: string}
      responses:
        "200":
          description: Snapshot settled
  /api/v1/ranking/daily:
    get:
      tags: [Product]
      summary: Daily regional ranking board
      description: |
        Requires FEATURE_RANKING=true. When disabled returns 501 with reason_code feature_unavailable.
        Production defaults FEATURE_RANKING=false.
      operationId: rankingDaily
      security:
        - bearerAuth: []
      parameters:
        - name: city
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Ranking board (may be empty but authoritative when enabled)
          content:
            application/json:
              schema:
                type: object
                properties:
                  city:
                    type: string
                  date:
                    type: string
                  entries:
                    type: array
                    items:
                      type: object
                  source:
                    type: string
                  request_id:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/pvp/cancel:
    post:
      tags: [PvP]
      summary: Cancel matchmaking queue (AP-115)
      operationId: pvpCancel
      security: [{bearerAuth: []}]
      responses:
        "200": {description: Cancelled}
  /api/v1/pvp/match:
    post:
      tags: [Product]
      summary: Request PvP match
      description: |
        Requires FEATURE_PVP=true. When disabled returns 501 feature_unavailable.
        When enabled but matchmaking is not ready, returns 503 feature_unavailable (never empty match_id with 2xx).
      operationId: pvpMatch
      security:
        - bearerAuth: []
      responses:
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"
        "503":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/pvp/result:
    post:
      tags: [Product]
      summary: Report PvP result (server-authoritative)
      description: |
        Requires FEATURE_PVP=true. Disabled or not-ready returns 501/503 feature_unavailable.
        When command_log includes players/enemies/commands (AP-102), server re-simulates and rejects winner mismatch.
      operationId: pvpResult
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"
        "503":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/battle/catalog:
    get:
      tags: [Battle]
      summary: Battle design catalog (skills, roles, statuses, archetypes)
      description: |
        AP-102 authoritative design data. Always available when authenticated.
        Includes ≥12 skills, ≥6 enemy archetypes, recommended teams, upgrade tiers.
      operationId: battleCatalog
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Catalog payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleCatalogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/battle/pve/start:
    post:
      tags: [Battle]
      summary: Start authoritative PvE battle session
      description: |
        Server generates battle seed, materializes enemy team from archetype,
        returns pre-battle threats. Team snapshot is frozen for settlement.
      operationId: battlePveStart
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BattlePveStartRequest"
      responses:
        "200":
          description: Open session with seed, enemies, threats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattlePveStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/battle/pve/settle:
    post:
      tags: [Battle]
      summary: Settle PvE battle via seed+command log replay
      description: |
        Server re-simulates commands against frozen team/enemy snapshots.
        Client claimed_winner must match server result when provided (tamper reject).
        Idempotent for completed sessions.
      operationId: battlePveSettle
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BattlePveSettleRequest"
      responses:
        "200":
          description: Authoritative result + failure factors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattlePveSettleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: not owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/battle/simulate:
    post:
      tags: [Battle]
      summary: Dry-run deterministic battle simulation
      description: Stateless replay helper for clients/tools. Same seed+commands → same result.
      operationId: battleSimulate
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BattleSimulateRequest"
      responses:
        "200":
          description: Simulation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleSimulateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"


  /api/v1/social/friends:
    get:
      tags: [Product]
      summary: List friends (cursor pagination)
      description: |
        Requires FEATURE_SOCIAL=true. Returns accepted friendships for the caller.
        Blocked peers never appear. When social_enabled=false (e.g. minor defaults), returns empty list.
      operationId: socialFriends
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        "200":
          description: Friends page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialFriendsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/friends/requests:
    get:
      tags: [Product]
      summary: List pending friend requests
      operationId: socialFriendRequests
      security:
        - bearerAuth: []
      parameters:
        - name: direction
          in: query
          schema: { type: string, enum: [incoming, outgoing], default: incoming }
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        "200":
          description: Pending requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialFriendRequestsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/friends/request:
    post:
      tags: [Product]
      summary: Send friend request
      description: |
        State machine pending→accepted|rejected|cancelled. Cross-invite auto-accepts.
        Block either way forbids the action. Duplicate pending is idempotent.
      operationId: socialFriendRequestCreate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialTargetUserRequest"
      responses:
        "200":
          description: Request created or existing pending returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialFriendRequestActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: blocked or social_disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: already_friends or friend_limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/friends/accept:
    post:
      tags: [Product]
      summary: Accept friend request (idempotent)
      operationId: socialFriendRequestAccept
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialRequestIDBody"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialFriendRequestActionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: blocked or unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/friends/reject:
    post:
      tags: [Product]
      summary: Reject friend request
      operationId: socialFriendRequestReject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialRequestIDBody"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialFriendRequestActionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/friends/cancel:
    post:
      tags: [Product]
      summary: Cancel outgoing friend request
      operationId: socialFriendRequestCancel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialRequestIDBody"
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialFriendRequestActionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/friends/remove:
    post:
      tags: [Product]
      summary: Remove an accepted friendship
      operationId: socialFriendRemove
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialTargetUserRequest"
      responses:
        "200":
          description: Removed (idempotent)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/block:
    post:
      tags: [Product]
      summary: Block a user (beats relationships and shares)
      description: |
        Idempotent. Removes friendship and cancels pending requests both ways.
        Blocked users cannot search, invite, view shares, or interact.
      operationId: socialBlock
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialTargetUserRequest"
      responses:
        "200":
          description: Blocked
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/unblock:
    post:
      tags: [Product]
      summary: Unblock a user
      operationId: socialUnblock
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialTargetUserRequest"
      responses:
        "200":
          description: Unblocked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/blocks:
    get:
      tags: [Product]
      summary: List blocked users
      operationId: socialBlocksList
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        "200":
          description: Block list
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/mute:
    post:
      tags: [Product]
      summary: Mute a user
      operationId: socialMute
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialTargetUserRequest"
      responses:
        "200":
          description: Muted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/unmute:
    post:
      tags: [Product]
      summary: Unmute a user
      operationId: socialUnmute
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialTargetUserRequest"
      responses:
        "200":
          description: Unmuted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/report:
    post:
      tags: [Product]
      summary: Report a user (no images / precise location)
      description: Rate-limited per reporter. Structured metadata only.
      operationId: socialReportUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category]
              properties:
                target_user_id: { type: string }
                user_key: { type: string }
                category:
                  type: string
                  enum: [harassment, spam, inappropriate, other]
                note: { type: string, maxLength: 500 }
      responses:
        "202":
          description: Accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/search:
    get:
      tags: [Product]
      summary: Search users by display name prefix
      description: Excludes self and either-way blocks. Requires social_enabled.
      operationId: socialSearch
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 32 }
      responses:
        "200":
          description: Matches
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: social_disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/settings:
    get:
      tags: [Product]
      summary: Get social settings for caller
      operationId: socialSettingsGet
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"
    patch:
      tags: [Product]
      summary: Update social settings
      description: |
        Minors cannot enable social (is_minor forces social_enabled=false).
        Display names are length/control/keyword validated.
      operationId: socialSettingsPatch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name: { type: string, maxLength: 32 }
                social_enabled: { type: boolean }
                is_minor: { type: boolean }
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/share:
    post:
      tags: [Product]
      summary: Create safe share capability token
      description: |
        Requires FEATURE_SOCIAL=true. Returns unguessable share_token (also as share_id).
        Snapshot never includes precise location, device_id, or image payloads.
        ACL: link | friends | public. Expiry + revoke supported.
      operationId: socialShareCreate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [animal_uuid]
              properties:
                animal_uuid: { type: string, format: uuid }
                acl:
                  type: string
                  enum: [link, friends, public]
                  default: link
                ttl_hours:
                  type: integer
                  minimum: 1
                  maximum: 720
      responses:
        "201":
          description: Share created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialShareView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: social_disabled or animal_not_owned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: animal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "501":
          $ref: "#/components/responses/FeatureUnavailable"

  /api/v1/social/share/{token}:
    get:
      tags: [Product]
      summary: Resolve share by capability token
      description: |
        Enforces ACL, expiry, revoke, and either-way block. Denied results may be cached briefly.
        Response never includes precise coordinates or device identifiers.
      operationId: socialShareGet
      security:
        - bearerAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string, minLength: 16 }
      responses:
        "200":
          description: Share view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialShareView"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: share_forbidden or blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
