openapi: 3.1.0
info:
  title: Animal Poke Backend API
  version: 1.0.0
  description: |
    Go 后端 API 契约（OpenAPI 3.1）。
    客户端仅持有 API Base URL + 设备 Token；第三方 Key 永不进入前端。
  contact:
    name: animal_poke team
  license:
    name: Proprietary
    url: https://github.com/Bluepoisons/animal_poke
servers:
  - url: https://api.animal-poke.app
    description: Production
  - url: https://api.staging.animal-poke.app
    description: Staging

tags:
  - name: Health
  - name: Content
    description: Versioned multi-locale content manifests (AP-080)
  - name: LiveOps
    description: Server-authoritative season and event instances (AP-081)
  - name: Notifications
    description: Inbox, outbox delivery and push preferences (AP-084)
  - name: Cases
    description: Unified backoffice case workflow (AP-086)
  - name: Auth
    description: Device registration, account binding and JWT issuance
  - name: Geo
    description: Reverse geocoding and location helpers
  - name: Weather
    description: Weather queries proxied via backend
  - name: Vision
    description: Image animal detection and analysis
  - name: Value
    description: Pet value generation
  - name: Adventure
    description: AI-generated Simplified Chinese companion expeditions and authoritative bond settlement
  - name: Sync
    description: Animal collection sync APIs
  - name: Privacy
    description: Consent, export and deletion requests
  - name: Security
    description: Client security and trusted time endpoints
  - name: Commerce
    description: Orders and entitlements
  - name: Economy
    description: Wallet balances, immutable reward ledger and inventory
  - name: Quest
    description: Data-driven quests, trusted progress events and idempotent reward claims
  - name: Photo
    description: Photography quality skill — calibration, scoring, personal best, daily themes (AP-098)
  - name: Admin
    description: Admin audit APIs
  - name: Observability
    description: Metrics and operational endpoints
  - name: Analytics
    description: Privacy-friendly funnel event ingest
  - name: Growth
    description: Researcher growth tracks, virtual companion profiles and authoritative growth events (AP-099)
  - name: Battle
    description: Team skills statuses archetypes and authoritative PvE settlement (AP-102)
  - name: Product
    description: Product feature endpoints (ranking/pvp placeholders)
  - name: PvP
    description: Player versus player matchmaking and settlement

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness (legacy)
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Process alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /livez:
    get:
      tags: [Health]
      summary: Liveness
      operationId: getLivez
      security: []
      responses:
        "200":
          description: Process alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /ready:
    get:
      tags: [Health]
      summary: Readiness (legacy)
      operationId: getReady
      security: []
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
  /readyz:
    get:
      tags: [Health]
      summary: Readiness
      operationId: getReadyz
      security: []
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
  /metrics:
    get:
      tags: [Observability]
      summary: Prometheus metrics (management plane only)
      description: |
        **AP-036**: Metrics are NOT available on the public API / Ingress port.
        Public `GET /metrics` on the main server returns **404**.

        Scrape the dedicated management listener instead:
        - Env: `METRICS_ADDR` (default `:9090`)
        - Path: `GET /metrics` on that address only
        - Kubernetes: ClusterIP Service `animal-poke-backend-metrics:9090`
          (never attach this Service to Ingress)

        Label set is fixed-cardinality: Gin route templates via `c.FullPath()`,
        unmatched routes use path=`unknown`, status is bucketed (`2xx`/`4xx`/…).
      operationId: getMetrics
      security: []
      responses:
        "200":
          description: Prometheus text exposition (management port only)
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Public API port deliberately does not expose metrics
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/ping:
    get:
      tags: [Health]
      summary: Ping
      operationId: ping
      security: []
      responses:
        "200":
          description: Pong
          content:
            application/json:
              schema:
                type: object
                required: [msg]
                properties:
                  msg:
                    type: string
                    example: pong
                  db:
                    type: boolean
                  app_env:
                    type: string
                  request_id:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/time:
    get:
      tags: [Security]
      summary: Trusted server time
      operationId: getTime
      security: []
      responses:
        "200":
          description: Signed server time
          headers:
            X-Server-Time:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/version:
    get:
      operationId: getClientVersion
      tags: [Health]
      summary: Client version negotiation (AP-089)
      description: |
        Returns min/current client version metadata and optional deprecation headers.
        Clients SHOULD send `X-Client-Version` on subsequent requests.
      security: []
      parameters:
        - name: X-Client-Version
          in: header
          required: false
          schema: { type: string }
          description: Client semantic version or build id
      responses:
        '200':
          description: Version negotiation payload
          headers:
            Deprecation:
              schema: { type: string }
            Sunset:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties:
                  min_client_version: { type: string }
                  current_api_version: { type: string }
                  recommended_client_version: { type: string }
                  deprecated: { type: boolean }
                  sunset_at:
                    type: string
                    format: date-time
                  capabilities:
                    type: object
                    additionalProperties: true
        '426':
          description: Client below minimum supported version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/device:
    post:
      tags: [Auth]
      summary: Register device and issue JWT
      description: |
        First registration generates an `installation_secret` (returned once).
        Subsequent token refresh must include the secret; knowing only `device_id` is insufficient.
      operationId: authDevice
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthDeviceRequest"
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthDeviceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/auth/bind:
    post:
      tags: [Auth]
      summary: Bind current device to an account (email; mock_oauth only when AUTH_MOCK_OAUTH_ENABLED)
      description: |
        Guest remains default. Binding creates or attaches an account, merges guest
        animals/entitlements without double-granting rewards. Credentials are stored hashed.
        New email bindings start unverified (AP-079); OAuth bindings are verified immediately.
        Unverified email cannot be used as a recovery credential on subsequent bind/login.
      operationId: authBind
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthBindRequest"
      responses:
        "200":
          description: Bound and token re-issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthAccountResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login to recover after clearing local data (email; mock_oauth only when AUTH_MOCK_OAUTH_ENABLED)
      description: |
        Recovers an account onto the provided `device_id`.
        **New device** (unknown device_id): links without ownership proof and does not claim another device's assets.
        **Claim existing guest assets** or **re-enable a revoked device**: requires `installation_secret` or a one-time `migration_ticket`.
        Knowing only another user's `device_id` is insufficient to merge their animals/orders/entitlements (AP-076).
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Logged in; guest assets on device_id merged only when ownership proof is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthAccountResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Device ownership proof required or device remains revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Migration ticket replay or device bound to another account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue new access token
      description: |
        Rotate-on-use refresh (AP-078). Server stores only peppered hashes.
        Concurrent refresh of the same token: exactly one succeeds; others return
        `refresh_conflict` (409) within the grace window.
        Reuse of an already-rotated token outside the grace window revokes the
        entire token family (`refresh_token_reused`) and bumps device token_version.
        Absolute and idle expiry are enforced. Device revoke / logout / privacy delete
        invalidate refresh families.
      operationId: authRefresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshRequest"
      responses:
        "200":
          description: New access + refresh pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthAccountResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid, expired, revoked, or reused refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Concurrent refresh race (reason_code=refresh_conflict)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current device (bump token version, clear refresh hash)
      operationId: authLogout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: logged_out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/account:
    get:
      tags: [Auth]
      summary: Current account profile (guest if unbound)
      operationId: authAccount
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account or guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthAccountInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/devices:
    get:
      tags: [Auth]
      summary: List devices linked to current account
      operationId: authListDevices
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthDeviceList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/devices/revoke:
    post:
      tags: [Auth]
      summary: Revoke a lost device
      operationId: authRevokeDevice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id]
              properties:
                device_id:
                  type: string
      responses:
        "200":
          description: Device revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  device_id:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Device not found

  /api/v1/auth/email/verify/request:
    post:
      tags: [Auth]
      summary: Request email verification mail (anti-enumeration)
      description: |
        Always returns 200 `accepted` whether or not the email exists or is pending (AP-079).
        Only unverified email bindings receive a verification token (TTL = EMAIL_VERIFY_TTL).
      operationId: authEmailVerifyRequest
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthEmailRequest"
      responses:
        "200":
          description: Accepted (anti-enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/email/verify:
    post:
      tags: [Auth]
      summary: Verify email with one-time token
      description: Consumes an email_verify security token; replay is rejected (AP-079).
      operationId: authEmailVerify
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthTokenRequest"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: verified
                  account_id:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Token replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/password/forgot:
    post:
      tags: [Auth]
      summary: Request password reset mail (anti-enumeration)
      description: |
        Always returns 200 `accepted`. Only verified email bindings receive a reset token (AP-079).
        Unverified emails cannot recover.
      operationId: authPasswordForgot
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthEmailRequest"
      responses:
        "200":
          description: Accepted (anti-enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/password/reset:
    post:
      tags: [Auth]
      summary: Reset password with one-time token
      description: |
        Consumes password_reset token, updates password hash, and revokes all access/refresh sessions (AP-079).
      operationId: authPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPasswordResetRequest"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: password_reset
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Token replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/password/change:
    post:
      tags: [Auth]
      summary: Change password (authenticated)
      description: |
        Requires verified email binding and current password. Invalidates all sessions and
        re-issues access/refresh for the current device (AP-079).
      operationId: authPasswordChange
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPasswordChangeRequest"
      responses:
        "200":
          description: Password changed; new tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthAccountResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/auth/unbind:
    post:
      tags: [Auth]
      summary: Unbind a provider
      description: |
        Requires reauth_password or reauth_token. Cannot remove the last recovery method
        (verified email or OAuth) (AP-079).
      operationId: authUnbind
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthUnbindRequest"
      responses:
        "200":
          description: Unbound
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  provider:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Re-auth required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Last recovery method
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/reauth:
    post:
      tags: [Auth]
      summary: Issue short-lived re-auth token
      description: Verifies password against verified email binding and returns a reauth token (AP-079).
      operationId: authReauth
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: Reauth token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  reauth_token:
                    type: string
                  expires_at:
                    type: string
                  token_type:
                    type: string
                    example: reauth
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/geo/city:
    get:
      tags: [Geo]
      summary: Reverse geocode city
      operationId: getCity
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Lat"
        - $ref: "#/components/parameters/Lng"
      responses:
        "200":
          description: City info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CityResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/weather/week:
    get:
      tags: [Weather]
      summary: Weekly weather
      operationId: getWeatherWeek
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Lat"
        - $ref: "#/components/parameters/Lng"
      responses:
        "200":
          description: Week weather
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherWeekResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/vision/detect:
    post:
      tags: [Vision]
      summary: Detect animals in image
      operationId: visionDetect
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "200":
          description: Detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionDetectResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/vision/detect/corrections:
    post:
      tags: [Vision]
      summary: Confirm a corrected species and create a derived detect credential
      description: |
        Creates an immutable detect inference derived from the original model result.
        Analyze remains strict and accepts the corrected species only with the returned credential.
        A concrete Simplified Chinese species label is always required; unregistered real animals
        use species=other_animal with labels such as 赤狐 or 仓鼠.
      operationId: visionDetectCorrection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisionCorrectionRequest"
      responses:
        "201":
          description: Derived user-confirmed detect credential
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionCorrectionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/vision/analyze:
    post:
      tags: [Vision]
      summary: Analyze selected animal target from a prior detect
      operationId: visionAnalyze
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                detect_inference_id:
                  type: string
                  description: Parent detect inference id (required when provenance is enabled)
                parent_inference_id:
                  type: string
                  description: Alias of detect_inference_id
                target_id:
                  type: string
                  description: Stable target id from detect.targets
                species:
                  type: string
                  description: Claimed species; must match the original or user-confirmed detect credential
                species_label_zh:
                  type: string
                  description: Concrete Simplified Chinese species name inherited from the detect credential
                box:
                  type: string
                  description: JSON bounding box {x,y,width,height} fractions 0-1
                box_x:
                  type: number
                box_y:
                  type: number
                box_width:
                  type: number
                box_height:
                  type: number
      responses:
        "200":
          description: Analysis result for the locked target
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisionAnalyzeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "422":
