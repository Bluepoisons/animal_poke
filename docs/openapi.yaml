      tags: [Content]
      summary: Versioned multi-locale content manifest (AP-080)
      description: |
        Returns filtered content package references with ETag and optional HMAC signature.
        Clients MUST honor 304 and fall back to last-known-good when revoked=true.
      security:
        - bearerAuth: []
      parameters:
        - name: locale
          in: query
          schema: { type: string, example: zh-CN }
        - name: region
          in: query
          schema: { type: string, example: CN }
        - name: age
          in: query
          schema: { type: string, enum: [everyone, teen] }
        - name: client_version
          in: query
          schema: { type: string }
        - name: X-Client-Version
          in: header
          schema: { type: string }
        - name: If-None-Match
          in: header
          schema: { type: string }
      responses:
        "200":
          description: Content manifest
          headers:
            ETag:
              schema: { type: string }
            X-Content-Revoked:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [schema_version, content_version, packages, etag]
                properties:
                  schema_version: { type: string }
                  content_version: { type: string }
                  locale: { type: string }
                  region: { type: string }
                  min_client_version: { type: string }
                  generated_at: { type: string, format: date-time }
                  revoked: { type: boolean }
                  packages:
                    type: array
                    items:
                      type: object
                      required: [kind, id, version]
                      properties:
                        kind: { type: string }
                        id: { type: string }
                        version: { type: string }
                        locale: { type: string }
                        url: { type: string }
                        checksum: { type: string }
                        labels:
                          type: object
                          additionalProperties: { type: string }
                  etag: { type: string }
                  signature: { type: string }
                  request_id: { type: string }
        "304":
          description: Not modified
        "426":
          description: Client below minimum version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          $ref: '#/components/responses/Unauthorized'
