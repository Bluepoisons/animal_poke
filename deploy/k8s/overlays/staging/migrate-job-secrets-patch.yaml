# Strategic merge: staging Job must not reference production backend-secrets.
apiVersion: batch/v1
kind: Job
metadata:
  name: animal-poke-migrate
spec:
  template:
    spec:
      containers:
        - name: migrate
          env:
            - name: AUTO_MIGRATE
              value: "false"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: jwt-secret
                  optional: true
