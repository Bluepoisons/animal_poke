# Staging secret contract (placeholder values only — never commit real keys).
# Create out-of-band:
#   kubectl -n staging create secret generic staging-backend-secrets \
#     --from-literal=jwt-secret='REPLACE_ME_32CHARS_MIN________' \
#     --from-literal=db-password='REPLACE_ME_STAGING_ONLY' \
#     --from-literal=admin-api-key='REPLACE_ME' \
#     --from-literal=tencent-map-key='REPLACE_ME' \
#     --from-literal=caiyun-weather-key='REPLACE_ME' \
#     --from-literal=vision-endpoint='https://api.example.com/v1' \
#     --from-literal=vision-key='REPLACE_ME' \
#     --from-literal=vision-model='vision-model' \
#     --from-literal=llm-endpoint='https://api.example.com/v1' \
#     --from-literal=llm-key='REPLACE_ME' \
#     --from-literal=llm-model='text-model'
#
# Credentials MUST differ from production. Staging uses DB animal_poke_staging
# on mysql.staging.svc.cluster.local — never mysql.production.
apiVersion: v1
kind: Secret
metadata:
  name: staging-backend-secrets
  namespace: staging
  labels:
    app: animal-poke-backend
    environment: staging
type: Opaque
stringData:
  jwt-secret: "REPLACE_ME_USE_EXTERNAL_SECRET_MANAGER____"
  jwt-signing-key: "REPLACE_ME_JWT_SIGNING_KEY_32CHARS____"
  account-token-pepper: "REPLACE_ME_ACCOUNT_PEPPER_32CHARS___"
  stats-hmac-key: "REPLACE_ME_STATS_HMAC_KEY_32CHARS______"
  time-signing-key: "REPLACE_ME_TIME_SIGNING_KEY_32CHARS____"
  db-password: "REPLACE_ME_STAGING_ONLY"
  admin-api-key: "REPLACE_ME"
  tencent-map-key: "REPLACE_ME"
  caiyun-weather-key: "REPLACE_ME"
  vision-endpoint: "https://REPLACE_ME"
  vision-key: "REPLACE_ME"
  vision-model: "REPLACE_ME"
  llm-endpoint: "https://REPLACE_ME"
  llm-key: "REPLACE_ME"
  llm-model: "REPLACE_ME"
