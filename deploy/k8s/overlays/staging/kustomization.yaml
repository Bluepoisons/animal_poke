apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../
namespace: staging
nameSuffix: ""
patches:
  - target:
      kind: Namespace
      name: production
    patch: |-
      - op: replace
        path: /metadata/name
        value: staging
  - target:
      kind: ConfigMap
      name: backend-config
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: staging
      - op: replace
        path: /data/CORS_ALLOWED_ORIGINS
        value: "https://app.staging.animal-poke.example.com,http://localhost:5173"
  - target:
      kind: Ingress
      name: animal-poke-api
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.staging.animal-poke.example.com
      - op: replace
        path: /spec/rules/0/host
        value: api.staging.animal-poke.example.com
  - target:
      kind: Ingress
      name: animal-poke-web
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: app.staging.animal-poke.example.com
      - op: replace
        path: /spec/rules/0/host
        value: app.staging.animal-poke.example.com
