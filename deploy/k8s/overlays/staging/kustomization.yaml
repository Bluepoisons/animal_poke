apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - network-policy.yaml
namespace: staging
# Immutable release tag injected by CI / release pipeline via:
#   kustomize edit set image ...:backend:${IMAGE_TAG} ...:frontend:${IMAGE_TAG}
images:
  - name: registry.cn-beijing.aliyuncs.com/animal-poke/backend
    newTag: "0.0.0-unset"
  - name: registry.cn-beijing.aliyuncs.com/animal-poke/frontend
    newTag: "0.0.0-unset"
patches:
  - target:
      kind: Namespace
      name: production
    patch: |-
      - op: replace
        path: /metadata/name
        value: staging
      - op: add
        path: /metadata/labels/environment
        value: staging
  - target:
      kind: ConfigMap
      name: backend-config
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: staging
      - op: replace
        path: /data/GIN_MODE
        value: release
      - op: replace
        path: /data/DB_HOST
        value: mysql.staging.svc.cluster.local
      - op: replace
        path: /data/DB_NAME
        value: animal_poke_staging
      - op: replace
        path: /data/DB_USER
        value: animal_poke_staging
      - op: replace
        path: /data/CORS_ALLOWED_ORIGINS
        value: "https://app.staging.animal-poke.example.com,http://localhost:5173"
  # Point all secretKeyRefs at staging-scoped secret (created out-of-band).
  - target:
      kind: Deployment
      name: animal-poke-backend
    path: backend-secrets-patch.yaml
  - target:
      kind: Ingress
      name: animal-poke-api
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.staging.animal-poke.example.com
      - op: replace
        path: /spec/rules/0/host
        value: api.staging.animal-poke.example.com
  - target:
      kind: Ingress
      name: animal-poke-web
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: app.staging.animal-poke.example.com
      - op: replace
        path: /spec/rules/0/host
        value: app.staging.animal-poke.example.com
