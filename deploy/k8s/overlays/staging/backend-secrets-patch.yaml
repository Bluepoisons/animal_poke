# Strategic merge: override secret names for all env secretKeyRefs.
# Target is selected by kustomization.yaml (Deployment/animal-poke-backend).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: animal-poke-backend
spec:
  template:
    spec:
      containers:
        - name: backend
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: jwt-secret
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: jwt-signing-key
                  optional: true
            - name: ACCOUNT_TOKEN_PEPPER
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: account-token-pepper
            - name: STATS_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: stats-hmac-key
            - name: TIME_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: time-signing-key
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: db-password
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: admin-api-key
            - name: TENCENT_MAP_KEY
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: tencent-map-key
            - name: CAIYUN_WEATHER_KEY
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: caiyun-weather-key
            - name: VISION_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: vision-endpoint
            - name: VISION_KEY
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: vision-key
            - name: VISION_MODEL
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: vision-model
            - name: LLM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: llm-endpoint
            - name: LLM_KEY
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: llm-key
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: staging-backend-secrets
                  key: llm-model
