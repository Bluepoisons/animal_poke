apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  # Production-only backup CronJob (references mysql.production — never include in staging)
  - mysql-backup-cronjob.yaml
  - network-policy.yaml
namespace: production
# Immutable release tag injected by CI / release pipeline:
#   IMAGE_TAG=$GITHUB_SHA ./deploy/k8s/scripts/assert-manifests.sh
images:
  - name: registry.cn-beijing.aliyuncs.com/animal-poke/backend
    newTag: "0.0.0-unset"
  - name: registry.cn-beijing.aliyuncs.com/animal-poke/frontend
    newTag: "0.0.0-unset"
patches:
  - target:
      kind: Namespace
      name: production
    patch: |-
      - op: add
        path: /metadata/labels/environment
        value: production
  - target:
      kind: ConfigMap
      name: backend-config
    patch: |-
      - op: replace
        path: /data/CORS_ALLOWED_ORIGINS
        value: "https://app.animal-poke.example.com"
  - target:
      kind: Ingress
      name: animal-poke-api
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.animal-poke.example.com
      - op: replace
        path: /spec/rules/0/host
        value: api.animal-poke.example.com
  - target:
      kind: Ingress
      name: animal-poke-web
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: app.animal-poke.example.com
      - op: replace
        path: /spec/rules/0/host
        value: app.animal-poke.example.com
