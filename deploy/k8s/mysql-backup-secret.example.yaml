# Secret schema example for mysql-backup CronJob (AP-015).
# DO NOT apply with real credentials. DO NOT commit real keys.
#
# Create via External Secrets / cloud Secret Manager:
#   kubectl -n production create secret generic mysql-backup-secrets \
#     --from-literal=MYSQL_HOST=mysql.production.svc.cluster.local \
#     --from-literal=MYSQL_USER=animal_poke_backup \
#     --from-literal=MYSQL_PASSWORD='REPLACE_ME' \
#     --from-literal=MYSQL_DATABASE=animal_poke \
#     --from-literal=AWS_ACCESS_KEY_ID='REPLACE_ME' \
#     --from-literal=AWS_SECRET_ACCESS_KEY='REPLACE_ME' \
#     --from-literal=AWS_DEFAULT_REGION=cn-beijing \
#     --from-literal=S3_ENDPOINT=https://oss-cn-beijing.aliyuncs.com \
#     --from-literal=S3_BUCKET=s3://animal-poke-mysql-backups \
#     --from-literal=BACKUP_RETENTION_DAYS=14
#
# Not referenced by kustomization resources (documentation only).
apiVersion: v1
kind: Secret
metadata:
  name: mysql-backup-secrets
  namespace: production
  labels:
    app.kubernetes.io/name: mysql-backup
    app.kubernetes.io/part-of: animal-poke
    app.kubernetes.io/component: backup
type: Opaque
stringData:
  MYSQL_HOST: "mysql.production.svc.cluster.local"
  MYSQL_USER: "animal_poke_backup"
  MYSQL_PASSWORD: "REPLACE_ME"
  MYSQL_DATABASE: "animal_poke"
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  AWS_DEFAULT_REGION: "cn-beijing"
  S3_ENDPOINT: "https://oss-cn-beijing.aliyuncs.com"
  S3_BUCKET: "s3://animal-poke-mysql-backups"
  BACKUP_RETENTION_DAYS: "14"
