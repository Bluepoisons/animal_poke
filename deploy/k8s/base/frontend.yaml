apiVersion: apps/v1
kind: Deployment
metadata:
  name: animal-poke-frontend
  namespace: production
  labels:
    app: animal-poke-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: animal-poke-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: animal-poke-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: registry.cn-beijing.aliyuncs.com/animal-poke/frontend:0.0.0-unset
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: animal-poke-frontend
  namespace: production
spec:
  selector:
    app: animal-poke-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
