apiVersion: apps/v1
kind: Deployment
metadata:
  name: animal-poke-backend
  namespace: production
  labels:
    app: animal-poke-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: animal-poke-backend
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: animal-poke-backend
    spec:
      serviceAccountName: animal-poke-backend
      # AP-111: allow in-flight writes to finish; pair with preStop below.
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      # Spread across zones then nodes so single-zone failure keeps capacity.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: animal-poke-backend
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: animal-poke-backend
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: animal-poke-backend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          # 使用不可变标签：commit SHA 或 release digest，禁止 latest
          image: registry.cn-beijing.aliyuncs.com/animal-poke/backend:0.0.0-unset
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            # AP-036: management metrics port — ClusterIP only, never on Ingress
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: SERVER_ADDR
              value: ":8080"
            - name: METRICS_ADDR
              value: ":9090"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: jwt-secret
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: jwt-signing-key
                  optional: true
            - name: ACCOUNT_TOKEN_PEPPER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: account-token-pepper
            - name: STATS_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: stats-hmac-key
            - name: TIME_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: time-signing-key
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: db-password
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: admin-api-key
            - name: TENCENT_MAP_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: tencent-map-key
            - name: CAIYUN_WEATHER_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: caiyun-weather-key
            - name: VISION_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: vision-endpoint
            - name: VISION_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: vision-key
            - name: VISION_MODEL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: vision-model
            - name: LLM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: llm-endpoint
            - name: LLM_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: llm-key
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: llm-model
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          # Drain: fail readiness via SIGTERM handling window; sleep so LB de-registers.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          startupProbe:
            httpGet:
              path: /livez
              port: http
            failureThreshold: 30
            periodSeconds: 2
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: animal-poke-backend
  namespace: production
  labels:
    app: animal-poke-backend
spec:
  selector:
    app: animal-poke-backend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP
---
# AP-036: Prometheus scrape target — ClusterIP only, NOT referenced by Ingress.
# Scrape http://animal-poke-backend-metrics.<ns>.svc:9090/metrics from in-cluster Prometheus.
apiVersion: v1
kind: Service
metadata:
  name: animal-poke-backend-metrics
  namespace: production
  labels:
    app: animal-poke-backend
    app.kubernetes.io/component: metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: animal-poke-backend
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: animal-poke-backend-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: animal-poke-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
