# 非敏感运行时配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: production
  labels:
    app: animal-poke-backend
data:
  APP_ENV: "production"
  SERVER_ADDR: ":8080"
  GIN_MODE: "release"
  LOG_LEVEL: "INFO"
  JWT_ISSUER: "animal-poke"
  JWT_AUDIENCE: "animal-poke-client"
  JWT_ACCESS_TTL: "2h"
  AUTO_MIGRATE: "false"
  DB_HOST: "mysql.production.svc.cluster.local"
  DB_PORT: "3306"
  DB_NAME: "animal_poke"
  DB_USER: "animal_poke"
  DB_TLS: "false"
  # 生产必须配置精确前端 Origin（逗号分隔）
  CORS_ALLOWED_ORIGINS: "https://app.animal-poke.example.com"
  HTTP_READ_HEADER_TIMEOUT: "5s"
  HTTP_READ_TIMEOUT: "30s"
  HTTP_WRITE_TIMEOUT: "60s"
  HTTP_IDLE_TIMEOUT: "90s"
  HTTP_SHUTDOWN_TIMEOUT: "15s"
  MAX_IMAGE_BYTES: "5242880"
  MAX_IMAGE_PIXELS: "12000000"
