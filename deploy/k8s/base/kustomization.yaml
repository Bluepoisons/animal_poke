# Kustomize base
# Image tags default to 0.0.0-unset so overlays / CI MUST override with an
# immutable commit SHA or digest. Never ship :dev / :latest / :ci from base.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: production
resources:
  - namespace.yaml
  - backend-configmap.yaml
  - backend.yaml
  - pdb.yaml
  - frontend.yaml
  - ingress.yaml
  - migrate-job.yaml
labels:
  - pairs:
      app.kubernetes.io/part-of: animal-poke
    includeSelectors: false
images:
  - name: registry.cn-beijing.aliyuncs.com/animal-poke/backend
    newTag: "0.0.0-unset"
  - name: registry.cn-beijing.aliyuncs.com/animal-poke/frontend
    newTag: "0.0.0-unset"
