# Kustomize 基线
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: production
resources:
  - namespace.yaml
  - backend-configmap.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml
commonLabels:
  app.kubernetes.io/part-of: animal-poke
images:
  - name: registry.cn-beijing.aliyuncs.com/animal-poke/backend
    newTag: dev
  - name: registry.cn-beijing.aliyuncs.com/animal-poke/frontend
    newTag: dev
