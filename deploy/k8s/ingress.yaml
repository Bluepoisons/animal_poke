# 环境化 Ingress（Ingress Controller 注解限流 / TLS）
# 域名通过 overlays 或 CI 替换 __API_HOST__ / __APP_HOST__
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: animal-poke-api
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "6m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - __API_HOST__
      secretName: animal-poke-api-tls
  rules:
    - host: __API_HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: animal-poke-backend
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: animal-poke-web
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - __APP_HOST__
      secretName: animal-poke-web-tls
  rules:
    - host: __APP_HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: animal-poke-frontend
                port:
                  number: 80
