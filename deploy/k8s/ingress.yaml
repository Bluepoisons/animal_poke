apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: production
data:
  nginx.conf: |
    upstream backend {
      least_conn;
      server animal-poke-backend.production.svc.cluster.local:80;
      keepalive 32;
    }

    server {
      listen 80;

      # 健康检查
      location /health {
        proxy_pass http://backend;
        proxy_connect_timeout 2s;
      }

      # API 反代
      location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
      }

      # 限流
      limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

      location /api/v1/vision/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://backend;
      }
    }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: animal-poke-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.animal-poke.example.com
      secretName: animal-poke-tls
  rules:
    - host: api.animal-poke.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: animal-poke-backend
                port:
                  number: 80
