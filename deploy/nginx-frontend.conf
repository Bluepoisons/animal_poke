server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 健康检查（前端容器自身，不依赖后端）
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # 运行时公开配置（同域 /api 或绝对 API 基址）；禁止缓存
    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/javascript; charset=utf-8";
        try_files $uri =404;
    }

    # index.html 不缓存，确保 SPA 更新
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # 带 hash 的静态资源长期缓存
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service Worker / PWA 清单不缓存
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location ~* (workbox|manifest|registerSW).*\.(js|json)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # ---------------------------------------------------------------------------
    # Same-origin /api reverse proxy → backend (default animal-poke-backend:80)
    # BACKEND_UPSTREAM is substituted at container start (envsubst template).
    # Never SPA-fallback API paths to index.html.
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $http_x_request_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;

        # Upstream down / timeout → JSON 502/504, never HTML SPA shell
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_upstream_error;
    }

    # Exact /api without trailing slash
    location = /api {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_upstream_error;
    }

    location @api_upstream_error {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 502 '{"error":"bad gateway","reason_code":"upstream_unavailable"}';
    }

    # SPA fallback — only non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头（connect-src 仅 'self'：生产走同域 /api，禁止 broad https:）
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com;" always;
}
