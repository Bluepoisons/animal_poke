name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: "1.25.12"
  NODE_VERSION: "22"
  # Pin security / analysis tools — never use @latest in CI (AP-041)
  GOVULNCHECK_VERSION: "v1.1.4"
  STATICCHECK_VERSION: "2026.1"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Narrative QA gate (AP-134)
        run: go run ./cmd/narrativeqa -report narrative-qa-report.json
      - name: Upload narrative QA report
        uses: actions/upload-artifact@v7
        with:
          name: narrative-qa-report
          path: backend/narrative-qa-report.json
          if-no-files-found: error
      - name: Race
        run: go test -race ./...
      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@${{ env.STATICCHECK_VERSION }}
          staticcheck ./...
      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          govulncheck ./...

  backend-mysql:
    name: Backend MySQL integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: animal_poke
          MYSQL_USER: animal_poke
          MYSQL_PASSWORD: animal_poke
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      RUN_MYSQL_TESTS: "1"
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: animal_poke
      DB_PASSWORD: animal_poke
      DB_NAME: animal_poke
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Integration tests (fail if MySQL unreachable)
        run: go test -tags=integration ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Assert npm lockfile (single package manager)
        run: |
          set -euo pipefail
          test -f package-lock.json
          if [ -f pnpm-lock.yaml ] || [ -f yarn.lock ]; then
            echo "Only npm is supported; remove pnpm-lock.yaml / yarn.lock (AP-041)"
            exit 1
          fi
      - name: Install
        run: npm ci
      - name: npm audit (high+)
        run: npm audit --audit-level=high
      - name: Generate SBOM (CycloneDX)
        run: npm sbom --sbom-format cyclonedx --sbom-type application > sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-sbom
          path: frontend/sbom.cdx.json
          if-no-files-found: error
      - name: Narrative ethics content gate (AP-130)
        run: npm run content:ethics && npm run test:content-ethics
      - name: Typecheck & build
        run: npm run build
        env:
          # Production-like: empty base → same-origin /api
          VITE_API_BASE_URL: ""
      - name: Bundle budget gate (AP-058)
        run: npm run check:bundle-budget
      - name: Unit tests
        # AP-014: hard fail unit tests (no continue-on-error)
        run: npm test
      - name: AnimalPoke entry tests
        run: npx vitest run src/features/animal-poke
      - name: Production-path coverage floor
        run: npm run test:coverage -- src/features/animal-poke src/services/visionDetect.ts src/services/capturePipeline.ts src/services/syncQueue.ts src/auth/deviceAuth.ts src/compliance src/capture/session.ts || npm test -- src/features/animal-poke src/services src/auth src/compliance src/capture/session.ts

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E hard gate (production entry, chromium)
        # Chromium is the CI hard gate; WebKit is opt-in via PLAYWRIGHT_WEBKIT=1 locally.
        run: npx playwright test --project=chromium
        env:
          CI: true
          PLAYWRIGHT_WEBKIT: "1"
          VITE_API_BASE_URL: ""
          VITE_VISION_MOCK: "0"
      - name: Upload E2E trace (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-traces
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7

  openapi:
    name: OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Validate OpenAPI 3.1
        run: npx --yes @redocly/cli@1 lint docs/openapi.yaml
      - name: Bidirectional Gin ↔ OpenAPI contract gate (AP-033)
        run: |
          # Fails when /api/v1 METHOD+path sets diverge between router.go and openapi.yaml
          node scripts/openapi-contract-gate.mjs
      - name: API test matrix inventory gate (AP-091)
        run: |
          # Full operation inventory + matrix + contract_matrix_test.go coverage (49 ops)
          node scripts/api-test-matrix-gate.mjs
      - name: Contract matrix unit tests (AP-091)
        run: |
          cd backend && go test ./internal/routes -run TestContractMatrix -count=1
      - name: Require committed schema.d.ts matches OpenAPI
        run: |
          set -euo pipefail
          # AP-033: generated client must be committed and fresh.
          # Never auto-copy generated output to pass CI.
          if [ ! -f frontend/src/api/generated/schema.d.ts ]; then
            echo "FATAL: frontend/src/api/generated/schema.d.ts is missing."
            echo "Run: (cd frontend && npm run openapi:gen) and commit the result."
            exit 1
          fi
          npx --yes openapi-typescript@7 docs/openapi.yaml -o /tmp/api.d.ts
          if ! diff -u frontend/src/api/generated/schema.d.ts /tmp/api.d.ts; then
            echo "FATAL: schema.d.ts is stale relative to docs/openapi.yaml"
            echo "Run: (cd frontend && npm run openapi:gen) and commit the result."
            exit 1
          fi
          echo "schema.d.ts matches openapi.yaml"
      - name: N-1 compatibility gate (AP-089)
        run: node scripts/n1-contract-gate.mjs
      - name: Content manifest gate (AP-110)
        run: node scripts/content-manifest-gate.mjs

  container:
    name: Container
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v7
      - name: Build backend image
        run: docker build -f deploy/Dockerfile -t animal-poke-backend:ci ./backend
      - name: Build frontend image
        run: |
          docker build -f deploy/Dockerfile.frontend \
            --build-arg VITE_API_BASE_URL= \
            -t animal-poke-frontend:ci .
      - name: Create docker network
        run: docker network create ap-ci || true
      - name: Start backend
        run: |
          docker run -d --name ap-be --network ap-ci --network-alias animal-poke-backend \
            -e APP_ENV=development \
            -e AI_MOCK_ENABLED=true \
            -e JWT_SECRET=ci-test-secret-at-least-32-chars \
            -e SERVER_ADDR=:8080 \
            animal-poke-backend:ci
      - name: Start frontend
        run: |
          # CI: backend listens on 8080; K8s Service maps 80→8080, so override upstream here
          docker run -d --name ap-fe --network ap-ci \
            -e BACKEND_UPSTREAM=animal-poke-backend:8080 \
            -e API_BASE_URL= \
            -p 18081:80 \
            animal-poke-frontend:ci
      - name: Wait for backend livez
        run: |
          for i in $(seq 1 40); do
            if docker exec ap-be wget -qO- http://127.0.0.1:8080/livez; then
              echo
              exit 0
            fi
            sleep 1
          done
          docker logs ap-be
          exit 1
      - name: Wait for backend readyz (hard fail)
        # AP-039: /readyz non-200 must fail the job. Never soft-fail with `|| true`.
        run: |
          set -euo pipefail
          for i in $(seq 1 40); do
            # Capture HTTP status without swallowing failures on the final assertion.
            if docker exec ap-be wget -qO- http://127.0.0.1:8080/readyz > /tmp/ap-readyz.json 2>/tmp/ap-readyz.err; then
              echo "readyz body: $(cat /tmp/ap-readyz.json)"
              # double-check via curl on the docker network for a numeric status code
              code=$(docker run --rm --network ap-ci curlimages/curl:8.5.0 \
                -sS -o /tmp/readyz-body -w '%{http_code}' \
                http://animal-poke-backend:8080/readyz || echo "000")
              echo "readyz HTTP ${code}"
              if [ "${code}" = "200" ]; then
                exit 0
              fi
              echo "readyz returned HTTP ${code}, retrying..."
            fi
            sleep 1
          done
          echo "readyz never became HTTP 200" >&2
          docker logs ap-be
          cat /tmp/ap-readyz.err 2>/dev/null || true
          exit 1
      - name: Wait for frontend healthz
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:18081/healthz; then
              echo
              exit 0
            fi
            sleep 1
          done
          docker logs ap-fe
          exit 1
      - name: Frontend image smoke
        run: |
          chmod +x deploy/scripts/frontend-smoke.sh
          FRONTEND_SMOKE_URL=http://127.0.0.1:18081 ./deploy/scripts/frontend-smoke.sh
      - name: Backend direct smoke (livez + readyz hard)
        run: |
          set -euo pipefail
          docker run --rm --network ap-ci curlimages/curl:8.5.0 \
            -fsS http://animal-poke-backend:8080/livez
          # AP-039: hard fail on non-200 readyz — do not append `|| true`
          code=$(docker run --rm --network ap-ci curlimages/curl:8.5.0 \
            -sS -o /tmp/readyz.json -w '%{http_code}' \
            http://animal-poke-backend:8080/readyz)
          echo "readyz HTTP ${code}"
          cat /tmp/readyz.json || true
          echo
          test "${code}" = "200"
      - name: Cleanup
        if: always()
        run: |
          docker logs ap-fe 2>/dev/null | tail -n 80 || true
          docker logs ap-be 2>/dev/null | tail -n 80 || true
          docker rm -f ap-fe ap-be || true
          docker network rm ap-ci || true


  k8s:
    name: K8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install kustomize
        run: |
          curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz | tar xz
          sudo mv kustomize /usr/local/bin/
          kustomize version
      - name: Render & assert overlays (IMAGE_TAG=$GITHUB_SHA)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          chmod +x deploy/k8s/scripts/assert-manifests.sh
          # Build both overlays with immutable commit SHA and fail on any isolation/tag violation.
          # Also enforces AP-015 backup artifacts (S3 SSE checksum CronJob, runbook, drill script).
          deploy/k8s/scripts/assert-manifests.sh
      - name: AP-015 backup restore drill dry-run
        run: |
          set -euo pipefail
          chmod +x deploy/scripts/backup-restore-drill.sh
          ./deploy/scripts/backup-restore-drill.sh --dry-run
      - name: Extra staging isolation grep (belt-and-suspenders)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          work=$(mktemp -d)
          cp -a deploy/k8s/. "$work/k8s/"
          (
            cd "$work/k8s/overlays/staging"
            kustomize edit set image \
              "registry.cn-beijing.aliyuncs.com/animal-poke/backend:${IMAGE_TAG}" \
              "registry.cn-beijing.aliyuncs.com/animal-poke/frontend:${IMAGE_TAG}"
            kustomize build . > /tmp/staging.yaml
          )
          # Fail hard if any production host / mutable tag / placeholder leaks in.
          ! grep -E 'mysql\.production\.svc|:dev|:latest|:ci|__IMAGE_TAG__|0\.0\.0-unset' /tmp/staging.yaml
          grep -q 'mysql.staging.svc.cluster.local' /tmp/staging.yaml
          grep -q "backend:${IMAGE_TAG}" /tmp/staging.yaml
          grep -q "frontend:${IMAGE_TAG}" /tmp/staging.yaml
          grep -q 'staging-backend-secrets' /tmp/staging.yaml
          # AP-015: staging must never ship production backup CronJob
          ! grep -E 'kind:[[:space:]]*CronJob|mysql-backup' /tmp/staging.yaml
      - name: Assert frontend BACKEND_UPSTREAM + AP-015 backup in production overlay
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          work=$(mktemp -d)
          cp -a deploy/k8s/. "$work/k8s/"
          (
            cd "$work/k8s/overlays/production"
            kustomize edit set image \
              "registry.cn-beijing.aliyuncs.com/animal-poke/backend:${IMAGE_TAG}" \
              "registry.cn-beijing.aliyuncs.com/animal-poke/frontend:${IMAGE_TAG}"
            kustomize build . > /tmp/prod.yaml
          )
          grep -q 'BACKEND_UPSTREAM' /tmp/prod.yaml
          grep -q 'animal-poke-backend:80' /tmp/prod.yaml
          # AP-015 durable encrypted backup path
          grep -q 'kind: CronJob' /tmp/prod.yaml
          grep -q 'mysql-backup' /tmp/prod.yaml
          grep -q 'aws s3 cp' /tmp/prod.yaml
          grep -q 'AES256' /tmp/prod.yaml
          grep -q 'BACKUP_OK' /tmp/prod.yaml
          grep -q 'S3_BUCKET' /tmp/prod.yaml
          ! grep -E 'TODO: aws s3|TODO:.*rclone' /tmp/prod.yaml

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
