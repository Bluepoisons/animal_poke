name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  GO_VERSION: "1.25.12"
  NODE_VERSION: "22"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Race
        run: go test -race ./...
      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2026.1
          staticcheck ./...
      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  vision-golden-stub:
    name: vision-golden-stub
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Vision golden set (stub provider)
        run: make vision-golden-stub

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Typecheck & build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080
      - name: Unit tests
        run: npm test
        continue-on-error: true
        # 前端 #85 修复 27 条 localStorage 失败前允许 soft-fail；门禁以 typecheck/build 为准
      - name: AnimalPoke entry tests
        run: npx vitest run src/features/animal-poke

  openapi:
    name: OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Validate OpenAPI 3.1
        run: npx --yes @redocly/cli@1 lint docs/openapi.yaml
      - name: Check generated TS client is fresh
        run: |
          npx --yes openapi-typescript@7 docs/openapi.yaml -o /tmp/api.d.ts
          # 若仓库已提交生成物则 diff；否则仅确保生成成功
          if [ -f frontend/src/api/generated/schema.d.ts ]; then
            diff -u frontend/src/api/generated/schema.d.ts /tmp/api.d.ts
          else
            mkdir -p frontend/src/api/generated
            cp /tmp/api.d.ts frontend/src/api/generated/schema.d.ts
            echo "generated client written for first-time baseline"
          fi

  container:
    name: Container
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v7
      - name: Build backend image
        run: docker build -f deploy/Dockerfile -t animal-poke-backend:ci ./backend
      - name: Smoke health
        run: |
          docker run -d --name ap-be \
            -e APP_ENV=development \
            -e AI_MOCK_ENABLED=true \
            -e JWT_SECRET=ci-test-secret-at-least-32-chars \
            -e SERVER_ADDR=:8080 \
            -p 18080:8080 animal-poke-backend:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/livez; then
              echo
              curl -fsS http://127.0.0.1:18080/readyz || true
              echo
              exit 0
            fi
            sleep 1
          done
          docker logs ap-be
          exit 1
      - name: Cleanup
        if: always()
        run: docker rm -f ap-be || true

  k8s:
    name: K8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install kustomize
        run: |
          curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz | tar xz
          sudo mv kustomize /usr/local/bin/
          kustomize version
      - name: Render & assert overlays (IMAGE_TAG=$GITHUB_SHA)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          chmod +x deploy/k8s/scripts/assert-manifests.sh
          # Build both overlays with immutable commit SHA and fail on any isolation/tag violation.
          deploy/k8s/scripts/assert-manifests.sh
      - name: Extra staging isolation grep (belt-and-suspenders)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          work=$(mktemp -d)
          cp -a deploy/k8s/. "$work/k8s/"
          (
            cd "$work/k8s/overlays/staging"
            kustomize edit set image \
              "registry.cn-beijing.aliyuncs.com/animal-poke/backend:${IMAGE_TAG}" \
              "registry.cn-beijing.aliyuncs.com/animal-poke/frontend:${IMAGE_TAG}"
            kustomize build . > /tmp/staging.yaml
          )
          # Fail hard if any production host / mutable tag / placeholder leaks in.
          ! grep -E 'mysql\.production\.svc|:dev|:latest|:ci|__IMAGE_TAG__|0\.0\.0-unset' /tmp/staging.yaml
          grep -q 'mysql.staging.svc.cluster.local' /tmp/staging.yaml
          grep -q "backend:${IMAGE_TAG}" /tmp/staging.yaml
          grep -q "frontend:${IMAGE_TAG}" /tmp/staging.yaml
          grep -q 'staging-backend-secrets' /tmp/staging.yaml

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
